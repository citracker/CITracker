name: Staging-CITracker

on:
  push:
    branches:
      - staging
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    environment: Staging
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Build with dotnet
        run: dotnet build --configuration Release

      # DEBUG: Find the file
      - name: Find appsettings.Staging.json
        run: |
          Write-Host "Current directory: $(Get-Location)"
          Write-Host "Files in current directory:"
          Get-ChildItem -Recurse -Filter "appsettings.Staging.json" | ForEach-Object { 
            Write-Host "Found: $($_.FullName)" 
          }
        shell: pwsh

      # DEBUG: Show original content
      - name: Show original content
        run: |
          $file = Get-ChildItem -Recurse -Filter "appsettings.Staging.json" | Select-Object -First 1
          if ($file) {
            Write-Host "Content of $($file.FullName):"
            Get-Content $file.FullName
          } else {
            Write-Host "File not found!"
          }
        shell: pwsh

        # DEBUG: Verify secret is accessible
      - name: Verify secret accessibility
        run: |
          if ("${{ secrets.STAGING_DB_CONNECTION }}" -eq "") {
            Write-Host "❌ SECRET IS EMPTY - Environment not linked correctly!"
            Write-Host "Check that:"
            Write-Host "  1. Job has 'environment: Staging' set"
            Write-Host "  2. Environment name matches exactly (case-sensitive)"
            Write-Host "  3. Secret exists in that environment"
          } else {
            Write-Host "✅ Secret is accessible (value masked)"
          }
        shell: pwsh

      # Substitute variables
      - name: Replace variables in appsettings.Staging.json
        uses: im-open/variable-substitution@v2.1.0
        with:
          files: '**/appsettings.Staging.json'
        env:
          AppSettings.SQLDBConnection: ${{ secrets.STAGING_DB_CONNECTION }}

      # DEBUG: Show modified content
      - name: Show modified content
        run: |
          $file = Get-ChildItem -Recurse -Filter "appsettings.Staging.json" | Select-Object -First 1
          if ($file) {
            Write-Host "Content after substitution in $($file.FullName):"
            Get-Content $file.FullName
          } else {
            Write-Host "File not found!"
          }
        shell: pwsh

      - name: dotnet publish
        run: dotnet publish -c Release -o "${{env.DOTNET_ROOT}}/myapp"

      # Verify file was copied to publish directory
      - name: Verify file in publish directory
        run: |
          Write-Host "Checking publish directory:"
          Get-ChildItem -Path "${{env.DOTNET_ROOT}}/myapp" -Recurse -Filter "*.json"
        shell: pwsh

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
      
      - name: Verify appsettings in artifact
        run: |
          Write-Host "Files in downloaded artifact:"
          Get-ChildItem -Recurse -Filter "*.json"
          
          if (Test-Path "appsettings.Staging.json") {
            Write-Host "appsettings.Staging.json found in root:"
            Get-Content "appsettings.Staging.json"
          } else {
            Write-Host "Looking for appsettings.Staging.json in subdirectories..."
            Get-ChildItem -Recurse -Filter "appsettings.Staging.json" | ForEach-Object {
              Write-Host "Found: $($_.FullName)"
              Get-Content $_.FullName
            }
          }
        shell: pwsh

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_1F981EF3B252426D9770158FFC151169 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_5DD66CF4791F43F292C44342DC8CDA8C }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_1DA76A3608AA4B35A46A723FFA51754F }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'CITracker'
          slot-name: 'Production'
          package: .

