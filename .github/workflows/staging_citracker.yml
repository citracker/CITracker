name: Staging-CITracker

on:
  push:
    branches:
      - staging
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    environment: Staging
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Build with dotnet
        run: dotnet build --configuration Release

      # Step 1: Find and show original file
      - name: Find appsettings.Staging.json
        run: |
          Write-Host "Current directory: $(Get-Location)"
          Get-ChildItem -Recurse -Filter "appsettings.Staging.json" | ForEach-Object { 
            Write-Host "Found: $($_.FullName)" 
          }
        shell: pwsh

      # Step 2: Show original content
      - name: Show original content
        run: |
          $file = Get-ChildItem -Recurse -Filter "appsettings.Staging.json" | Select-Object -First 1
          if ($file) {
            Write-Host "Original content:"
            Get-Content $file.FullName
          }
        shell: pwsh

      # Step 3: Decode Base64 connection string with proper escaping
      - name: Decode connection string from Base64
        id: decode_connection
        run: |
          Write-Host "Decoding connection string..."
          
          # Get the Base64 encoded string from secrets
          $encodedString = "${{ secrets.STAGING_DB_CONNECTION }}"
          
          if ([string]::IsNullOrEmpty($encodedString)) {
            Write-Host "::error::Base64 connection string secret is empty!"
            exit 1
          }
          
          try {
            # Decode the Base64 string
            $decodedBytes = [Convert]::FromBase64String($encodedString)
            $decodedString = [Text.Encoding]::UTF8.GetString($decodedBytes)
            
            Write-Host "✅ Successfully decoded connection string"
            Write-Host "Raw length: $($decodedString.Length) characters"
            
            # CRITICAL FIX: Escape the string for environment variable
            # Replace double quotes with escaped double quotes
            $escapedString = $decodedString -replace '"', '`"'
            
            # Set as environment variable with proper escaping
            Write-Host "Setting environment variable..."
            Add-Content -Path $env:GITHUB_ENV -Value "SQLDB_CONNECTION=$escapedString"
            
            Write-Host "✅ Environment variable set"
          }
          catch {
            Write-Host "::error::Failed to decode Base64 string: $_"
            exit 1
          }
        shell: pwsh

      # Step 4: Verify decoded connection string (without exposing it)
      - name: Verify decoded connection string
        run: |
          $connString = $env:SQLDB_CONNECTION
          if ([string]::IsNullOrEmpty($connString)) {
            Write-Host "❌ Decoded connection string is empty!"
            
            # Debug: Check if GITHUB_ENV worked
            Write-Host "Checking GITHUB_ENV content:"
            Get-Content $env:GITHUB_ENV
            exit 1
          } else {
            Write-Host "✅ Decoded connection string is ready"
            Write-Host "Length: $($connString.Length) characters"
            
            # Safe validation without exposing the actual string
            if ($connString -match "Server=") { Write-Host "  ✓ Contains Server" }
            if ($connString -match "Database=") { Write-Host "  ✓ Contains Database" }
            if ($connString -match "User ID=") { Write-Host "  ✓ Contains User ID" }
            if ($connString -match "Password=") { Write-Host "  ✓ Contains Password" }
            
            # Check if the string contains any unescaped quotes
            if ($connString -match '"') {
              Write-Host "⚠️  Connection string contains unescaped quotes"
            }
          }
        shell: pwsh
        env:
          SQLDB_CONNECTION: ${{ env.SQLDB_CONNECTION }}

      # Step 5: Substitute variables
      - name: Replace variables in appsettings.Staging.json
        uses: im-open/variable-substitution@v2.1.0
        with:
          files: '**/appsettings.Staging.json'
        env:
          AppSettings.SQLDBConnection: ${{ env.SQLDB_CONNECTION }}

      # Step 6: Verify substitution worked
      - name: Verify substitution
        run: |
          $file = Get-ChildItem -Recurse -Filter "appsettings.Staging.json" | Select-Object -First 1
          if ($file) {
            $content = Get-Content $file.FullName -Raw
            if ($content -match '"SQLDBConnection":\s*"([^"]+)"') {
              $value = $matches[1]
              if ([string]::IsNullOrEmpty($value)) {
                Write-Host "❌ SQLDBConnection is empty after substitution!"
              } else {
                Write-Host "✅ SQLDBConnection was substituted (length: $($value.Length) characters)"
                # Show masked version
                $masked = $content -replace '"SQLDBConnection":\s*"[^"]+"', '"SQLDBConnection": "***MASKED***"'
                Write-Host $masked
              }
            }
          }
        shell: pwsh

      - name: dotnet publish
        run: dotnet publish -c Release -o "${{env.DOTNET_ROOT}}/myapp"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    runs-on: windows-latest
    needs: build
    environment: Staging 
    permissions:
      id-token: write 
      contents: read
  
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_1F981EF3B252426D9770158FFC151169 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_5DD66CF4791F43F292C44342DC8CDA8C }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_1DA76A3608AA4B35A46A723FFA51754F }}
          
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'CITracker'
          slot-name: 'Production'
          package: .

