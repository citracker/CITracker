# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - leansensei

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    environment: Production
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Build with dotnet
        run: dotnet build --configuration Release

      - name: Replace variables in appsettings.Production.json
        uses: im-open/variable-substitution@v2.1.0
        with:
          files: '**/appsettings.Production.json'
        env:
          # Map GitHub secrets to JSON paths using dot notation
          AppSettings.SQLDBConnection: ${{ secrets.PRODUCTION_DB_CONNECTION }}
          AppSettings.Password: ${{ secrets.EMAIL_PASSWORD }}
          Stripe.SecretKey: ${{ secrets.SECRET_KEY }}
          Stripe.WebhookSecret: ${{ secrets.WEBHOOK_SECRET }}

      - name: dotnet publish
        run: dotnet publish -c Release -o "${{env.DOTNET_ROOT}}/myapp"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    environment: Production
    runs-on: windows-latest
    needs: build
    
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
      
      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'leansensei'
          slot-name: 'Production'
          package: .

          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_687AE3FF8C3A4936B9F00053240294A8 }}

